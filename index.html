<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张紫彤｜个人简历与作品集</title>
    <link rel="stylesheet" href="styles.css?v=20260513-1415" />
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <a class="brand" href="#home" aria-label="回到首页">
          <span class="brand-mark">ZT</span>
          <span>张紫彤</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="打开导航" aria-expanded="false">
          <span></span>
          <span></span>
        </button>
        <nav class="nav" aria-label="主导航">
          <button class="nav-link active" type="button" data-section="home">首页</button>
          <button class="nav-link" type="button" data-section="about">关于我</button>
          <button class="nav-link" type="button" data-section="experience">工作经历</button>
          <button class="nav-link" type="button" data-section="portfolio">作品集</button>
          <button class="nav-link" type="button" data-section="skills">爱好</button>
        </nav>
      </header>

      <main>
        <section id="home" class="section active" data-section-panel>
          <div class="hero-grid">
            <div class="hero-copy">
              <p class="eyebrow">Resume & Portfolio</p>
              <h1>张紫彤</h1>
              <p class="summary">2年PR与文化传播经验，擅长跨团队传播项目与内容策划</p>
              <div class="home-contact" aria-label="联系方式">
                <a href="tel:13319309366">电话 13319309366</a>
                <a href="mailto:freda08@163.com">邮箱 freda2048@163.com</a>
              </div>
              <div class="hero-actions">
                <a class="primary-action" href="assets/resume.pdf" download>下载简历</a>
                <button class="secondary-action" type="button" data-section-jump="portfolio">查看作品集</button>
              </div>
              <div class="page-dots" aria-label="快速切换页面">
                <button class="page-dot active" type="button" data-section-jump="home" aria-label="首页"></button>
                <button class="page-dot" type="button" data-section-jump="about" aria-label="关于我"></button>
                <button class="page-dot" type="button" data-section-jump="experience" aria-label="工作经历"></button>
                <button class="page-dot" type="button" data-section-jump="portfolio" aria-label="作品集"></button>
                <button class="page-dot" type="button" data-section-jump="skills" aria-label="爱好"></button>
              </div>
            </div>
            <div class="hero-panel" aria-label="个人能力概览">
              <button class="signal-card" type="button" data-portfolio-jump="tweet">
                <span>Content</span>
                <strong>内容策划</strong>
              </button>
              <button class="signal-card" type="button" data-portfolio-jump="media">
                <span>Brand</span>
                <strong>品牌传播</strong>
              </button>
              <img class="hero-portrait" src="assets/portrait-cutout.png" alt="张紫彤个人照片" />
              <button class="signal-card" type="button" data-portfolio-jump="event">
                <span>Culture</span>
                <strong>文化活动</strong>
              </button>
              <button class="signal-card" type="button" data-portfolio-jump="ai">
                <span>Plus AI</span>
                <strong>Plus AI</strong>
              </button>
              <div class="click-guide" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M4.6 3.4 19.2 14l-6.6 1.1 3.3 5.7-2.4 1.4-3.3-5.7-4.2 5.2L4.6 3.4Z" />
                </svg>
              </div>
            </div>
          </div>
        </section>

        <section id="about" class="section" data-section-panel>
          <div class="section-head">
            <p class="eyebrow">About</p>
            <h2>关于我</h2>
          </div>
          <div class="content-card stack-card top-card">
            <h3>教育背景</h3>
            <div id="educationList" class="education-grid"></div>
          </div>
          <div class="split-grid">
            <div class="content-card">
              <h3>过往经历包括</h3>
              <div id="aboutExperienceList" class="timeline"></div>
            </div>
            <div class="content-card">
              <h3>技能标签</h3>
              <div id="strengthList" class="tag-cloud"></div>
            </div>
          </div>
        </section>

        <section id="experience" class="section" data-section-panel>
          <div class="section-head">
            <p class="eyebrow">Experience</p>
            <h2>工作经历</h2>
          </div>
          <div id="experienceList" class="experience-grid"></div>
        </section>

        <section id="portfolio" class="section" data-section-panel>
          <div class="section-head with-action">
            <div>
              <p class="eyebrow">Portfolio System</p>
              <h2>作品集</h2>
            </div>
          </div>
          <div id="portfolioTabs" class="tabs" role="tablist" aria-label="作品集分类"></div>
          <div id="portfolioGrid" class="portfolio-grid"></div>
        </section>

        <section id="skills" class="section" data-section-panel>
          <div class="section-head">
            <p class="eyebrow">Hobbies</p>
            <h2>爱好</h2>
          </div>
          <div id="skillGrid" class="skill-grid"></div>
        </section>
      </main>
    </div>

    <div class="lightbox" hidden>
      <button class="lightbox-close" type="button" aria-label="关闭图片">×</button>
      <button class="lightbox-prev" type="button" aria-label="上一张">‹</button>
      <img class="lightbox-image" alt="" />
      <button class="lightbox-next" type="button" aria-label="下一张">›</button>
      <p class="lightbox-count"></p>
    </div>

    <div class="article-modal" hidden>
      <div class="article-dialog" role="dialog" aria-modal="true" aria-labelledby="articleTitle">
        <div class="article-header">
          <h3 id="articleTitle"></h3>
          <div class="article-actions">
            <a class="article-open-link" href="#" target="_blank" rel="noreferrer">打开原PDF</a>
            <button class="article-close" type="button" aria-label="关闭文章">×</button>
          </div>
        </div>
        <div class="article-pages" aria-label="文章页面"></div>
      </div>
    </div>

    <div class="portfolio-detail-modal" hidden>
      <aside class="portfolio-detail-drawer" role="dialog" aria-modal="true" aria-labelledby="portfolioDetailTitle">
        <div class="portfolio-detail-header">
          <div>
            <p class="eyebrow">Portfolio Detail</p>
            <h3 id="portfolioDetailTitle"></h3>
          </div>
          <button class="portfolio-detail-close" type="button" aria-label="关闭作品详情">×</button>
        </div>
        <div class="portfolio-detail-content"></div>
      </aside>
    </div>

    <div class="toast" role="status" aria-live="polite"></div>

    <script src="data.js?v=20260513-1415"></script>
    <script src="app.js?v=20260513-1415"></script>
  </body>
</html>
